# hCaptcha Solver API
# Usage:
#   cp deploy/.env.example deploy/.env   # then fill in keys
#   docker compose -f deploy/docker-compose.yml up -d --build
services:
  solver:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: hcaptcha-solver-api:latest
    container_name: hcaptcha-solver-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    # Chromium uses shared memory heavily; the app also passes
    # --disable-dev-shm-usage as a safety net.
    shm_size: "1gb"
    # Resource ceiling for the default 4 GB / 2 CPU tuning.
    mem_limit: 4g
    cpus: 2.0
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/healthz').status==200 else 1)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
